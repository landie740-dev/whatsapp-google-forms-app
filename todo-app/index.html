<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 My To-Do List</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📋 My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button class="add-btn" id="addBtn">Add Task</button>
            </div>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Task Stats -->
        <div class="stats">
            <span>Total: <strong id="totalCount">0</strong></span>
            <span>Completed: <strong id="completedCount">0</strong></span>
            <span>Remaining: <strong id="remainingCount">0</strong></span>
        </div>

        <!-- Tasks List -->
        <div class="tasks-section">
            <ul class="tasks-list" id="tasksList">
                <!-- Tasks will be added here -->
            </ul>
            <div class="empty-state" id="emptyState">
                <p>📋 No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button class="action-btn" id="clearCompletedBtn">Clear Completed</button>
            <button class="action-btn danger" id="clearAllBtn">Clear All</button>
            <button class="action-btn" id="exportBtn">Export</button>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
